name: Minecraft Server Monitor

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos (repo público = minutos gratis ilimitados)
  workflow_dispatch:         # permite correrlo manualmente para probar

permissions:
  contents: write            # necesario para poder guardar state.json

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install mcstatus

      - name: Ejecutar chequeo (Server List Ping real)
        env:
          MC_HOST: ${{ secrets.MC_HOST }}
          MC_PORT: ${{ secrets.MC_PORT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEALTHCHECKS_URL: ${{ secrets.HEALTHCHECKS_URL }}
        run: python monitor.py

      - name: Guardar estado (fallos consecutivos)
        run: |
          git config user.name "mc-monitor-bot"
          git config user.email "mc-monitor-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Actualizar estado del monitor"
          git push
